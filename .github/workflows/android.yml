name: Android CI

on:
  push:
    paths:
      - '.github/workflows/android.yml'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'gradle.properties'
      - 'public-stable-ids.txt'
      - 'settings.gradle'
    branches-ignore:
      - 'wip/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Install Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.14.3
          cache-disabled: true   # 🚫 tắt cache mặc định của action

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: gradle assembleRelease --build-cache

      - name: Rename APK with commit hash
        run: |
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/app-release-${short_sha}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-*.apk
          if-no-files-found: error
